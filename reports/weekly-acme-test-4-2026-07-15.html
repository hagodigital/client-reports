const SALT_B64 = "XAr5INqz2jGVvVVX/YkLew==";
const IV_B64 = "DqXFvarZmjwWwlB2SywxkQ==";
const ITERATIONS = 100000;

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function decrypt(password) {
  const salt = b64ToBytes(SALT_B64);
  const iv = b64ToBytes(IV_B64);
  const ciphertext = b64ToBytes(CIPHERTEXT_B64);

  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: ITERATIONS, hash: "SHA-256" },
    baseKey,
    { name: "AES-CBC", length: 256 },
    false,
    ["decrypt"]
  );
  const plainBuf = await crypto.subtle.decrypt({ name: "AES-CBC", iv: iv }, key, ciphertext);
  return new TextDecoder().decode(plainBuf);
}

document.getElementById("submit").addEventListener("click", async () => {
  const pw = document.getElementById("pw").value;
  const errorEl = document.getElementById("error");
  errorEl.textContent = "";
  try {
    const html = await decrypt(pw);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
